<script>
// determines the size of the table
const G_MIN = 1;
const G_MAX = 26;
const N_MIN = 0;
const N_MAX = 20;

// dict we will populate with the data from the references
var dimensions = {};
for (var g = G_MIN; g <= G_MAX; g++) {
  dimensions[g] = {};

  for (var n = N_MIN; n <= N_MAX; n++)
    dimensions[g][n] = {
      // initialise to the full list of possible dimensions
      "kappa" : Array.from({length: 3*g - 3 + n + 2}, (x, i) => i - 1),
      "references" : []
    };
}

// populating `dimensions` with the data from the references
for (key in references) {
  var reference = references[key]
  for (var i = 0; i < reference.dimensions.length; i++) {
    var g = reference.dimensions[i][0];
    var n = reference.dimensions[i][1];
    var kappa = reference.dimensions[i][2];

    // if kappa is not an integer it is an inequality and it doesn't propagate
    if (typeof kappa === "string") {
      dimensions[g][n].kappa = dimensions[g][n].kappa.filter(k => eval(k + kappa));
      dimensions[g][n].references.push(key);
    }
    // if kappa is an integer it is a definitive value
    else {
      // if it is -1 or 3g-3+n then we propagate
      if (kappa == -1) {
        for (var k = 0; k <= n; k++) {
          dimensions[g][k].kappa = -1;
          dimensions[g][k].references.push(key);
        }
      }
      else if (kappa == 3*g - 3 + n) {
        for (var k = n; k <= N_MAX; k++) {
          dimensions[g][k].kappa = 3*g - 3 + k;
          dimensions[g][k].references.push(key);
        }
      }
      // else we don't propagate
      else {
        dimensions[g][n].kappa = kappa;
        dimensions[g][n].references.push(key);
      }
    }
  }
}
</script>

<script>
// helpers for typesetting the moduli space in labels (no MathJax needed)
var MBAR = "<span class=\"ovl\">M</span>";      // M with a clean overline
function Mopen(g, n) { return "M<sub>" + g + "," + n + "</sub>"; }
function Mbar(g, n)  { return MBAR + "<sub>" + g + "," + n + "</sub>"; }

// A "property" describes one invariant displayed on the (g,n) table:
//   label       button caption
//   references  reference dictionary shown below the table
//   legend      [{cls, text}] rows explaining the colours
//   classify(g,n) -> {cls, info, refs}
//     cls   css class colouring the cell (empty = nothing known)
//     info  html shown above the table when the cell is selected
//     refs  keys of references relevant to this cell
var kodaira = {
  label: "Kodaira dimension",
  blurb: "The Kodaira dimension is a birational invariant, equal to &minus;&infin; or lying between 0 and the dimension, that measures how positive the canonical bundle is. For a moduli space it determines the birational type, from (uni)rational when it is &minus;&infin; to general type at the maximal value.",
  references: references,
  legend: [
    { cls: "negative",     text: "negative Kodaira dimension" },
    { cls: "general",      text: "general type" },
    { cls: "intermediate", text: "intermediate Kodaira dimension" },
    { cls: "range",        text: "some bounds exist" },
    { cls: "",             text: "nothing known" }
  ],
  classify: function(g, n) {
    var kappa = dimensions[g][n].kappa;
    var top = 3*g - 3 + n;
    var cls = "";
    if (kappa == -1) cls = "negative";
    else if (kappa == top) cls = "general";
    else if (0 <= kappa && kappa < top) cls = "intermediate";
    else if (kappa.length < top + 2) cls = "range";

    var dim;
    if (Array.isArray(kappa)) {
      var lower = Math.min(...kappa), upper = Math.max(...kappa);
      if (lower == -1) dim = "≤" + upper;
      else if (upper == top) dim = "≥" + lower;
      else dim = "∈[" + lower + "," + upper + "]";
    }
    else if (kappa == -1) dim = "-&infin;";
    else if (kappa == top) dim = kappa + ", so it is of general type";
    else dim = kappa + ", and the dimension is " + top;

    return {
      cls: cls,
      info: "The Kodaira dimension of " + Mopen(g, n) + " is " + dim,
      refs: dimensions[g][n].references
    };
  }
};

// whether the Chow ring is generated by tautological classes; data and chart
// from Section 3 of Larson's survey, with the original references it compiles.
var larsonSurvey = {
  author: "Larson, Hannah",
  title: "Chow rings, cohomology rings, and point counts of moduli spaces of curves",
  year: 2026
};
var tautologicalReferences = {
  "mumford":      { author: "Mumford, David", title: "Towards an enumerative geometry of the moduli space of curves", year: 1983, journal: "Arithmetic and geometry, Vol. II, Progr. Math. 36, Birkhäuser" },
  "faber-thesis": { author: "Faber, Carel", title: "Chow rings of moduli spaces of curves", year: 1988, journal: "Ph.D. thesis, Universiteit van Amsterdam" },
  "faber-m3":     { author: "Faber, Carel", title: "Chow rings of moduli spaces of curves I: the Chow ring of $\\overline{\\mathcal{M}}_3$", year: 1990, journal: "Ann. of Math. (2) 132, no. 2, 331–419" },
  "faber-m4":     { author: "Faber, Carel", title: "Chow rings of moduli spaces of curves II: some results on the Chow ring of $\\overline{\\mathcal{M}}_4$", year: 1990, journal: "Ann. of Math. (2) 132, no. 3, 421–449" },
  "MR1363060":    { author: "Izadi, Elham", title: "The Chow ring of the moduli space of curves of genus 5", year: 1995, journal: "The moduli space of curves, Progr. Math. 129, 267–304" },
  "penev-vakil":  { author: "Penev, Nikola and Vakil, Ravi", title: "The Chow ring of the moduli space of curves of genus six", year: 2015, journal: "Algebr. Geom. 2, no. 1, 123–136" },
  "belorousski":  { author: "Belorousski, Pavel", title: "Chow rings of moduli spaces of pointed elliptic curves", year: 1998, journal: "Ph.D. thesis, University of Chicago" },
  "graber-vakil": { author: "Graber, Tom and Vakil, Ravi", title: "On the tautological ring of $\\overline{\\mathcal{M}}_{g,n}$", year: 2001, journal: "Turkish J. Math. 25, no. 1, 237–243" },
  "vanzelm":      { author: "van Zelm, Jason", title: "Nontautological bielliptic cycles", year: 2018, journal: "Pacific J. Math. 294, no. 2, 495–504" },
  "2208.02357":   { author: "Canning, Samir and Larson, Hannah", title: "On the Chow and cohomology rings of moduli spaces of stable curves", year: 2022, journal: "to appear in J. Eur. Math. Soc." },
  "2104.05820":   { author: "Canning, Samir and Larson, Hannah", title: "The Chow rings of the moduli spaces of curves of genus 7, 8 and 9", year: 2024, journal: "J. Algebraic Geom. 33, no. 1, 55–116" },
  "ste":          { author: "Canning, Samir and Larson, Hannah and Payne, Sam", title: "Extensions of tautological rings and motivic structures in the cohomology of $\\overline{\\mathcal{M}}_{g,n}$", year: 2024, journal: "Forum Math. Pi 12, e23" },
  "2509.02950":   { author: "Liu, Yuhan", title: "On the Chow rings of the moduli spaces $\\mathcal{M}_{5,8}$ and $\\mathcal{M}_{5,9}$", year: 2025 },
  "2606.29656":   larsonSurvey
};
// per-cell attribution of the "tautological holds" results (Section 3.3);
// everything else in genus 2–9 is due to arXiv:2208.02357
var tautExceptions = {
  "2,0": "mumford", "2,1": "faber-thesis", "3,0": "faber-m3", "4,0": "faber-m4",
  "5,0": "MR1363060", "5,8": "2509.02950", "5,9": "2509.02950", "6,0": "penev-vakil",
  "7,0": "2104.05820", "8,0": "2104.05820", "9,0": "2104.05820",
  "7,1": "ste", "7,2": "ste", "7,3": "ste"
};
var tautologicalInfo = {
  both:        function(g, n) { return "A*(" + Mbar(g, n) + ") is tautological (hence so is A*(" + Mopen(g, n) + "))"; },
  open:        function(g, n) { return "A*(" + Mopen(g, n) + ") is tautological"; },
  opencptfail: function(g, n) { return "A*(" + Mopen(g, n) + ") is tautological, but A*(" + Mbar(g, n) + ") is not"; },
  cptfail:     function(g, n) { return "A*(" + Mbar(g, n) + ") is not tautological"; },
  openfail:    function(g, n) { return "A*(" + Mopen(g, n) + ") is not tautological (hence neither is A*(" + Mbar(g, n) + "))"; }
};
var tautologicalProp = {
  label: "Tautological ring",
  blurb: "The tautological ring is the subring of the Chow ring spanned by the natural &psi;- and &kappa;-classes and boundary strata. When the whole Chow ring is tautological the intersection theory of the moduli space is completely understood, so a failure signals the presence of genuinely mysterious algebraic cycles.",
  references: tautologicalReferences,
  legend: [
    { cls: "taut-both",        text: "A*(" + MBAR + "<sub>g,n</sub>) tautological" },
    { cls: "taut-open",        text: "A*(M<sub>g,n</sub>) tautological" },
    { cls: "taut-opencptfail", text: "A*(M<sub>g,n</sub>) tautological, A*(" + MBAR + "<sub>g,n</sub>) not" },
    { cls: "taut-cptfail",     text: "A*(" + MBAR + "<sub>g,n</sub>) not tautological" },
    { cls: "taut-openfail",    text: "A*(M<sub>g,n</sub>) not tautological" },
    { cls: "",                 text: "nothing known" }
  ],
  classify: function(g, n) {
    var s = tautological[g + "," + n];
    if (!s) return { cls: "", info: "", refs: [] };
    var k = g + "," + n, refs = [];
    if (s === "both" || s === "open" || s === "opencptfail")   // tautological holds
      refs.push(tautExceptions[k] || (g === 1 ? "belorousski" : "2208.02357"));
    if (s === "openfail" || s === "cptfail" || s === "opencptfail")   // fails
      refs.push(g === 1 ? "graber-vakil" : "vanzelm");
    refs.push("2606.29656");   // the survey, which compiles the chart
    return { cls: "taut-" + s, info: tautologicalInfo[s](g, n), refs: refs };
  }
};

// whether point counts over finite fields are polynomial in q; the two charts
// from Section 5 of Larson's survey, arXiv:2606.29656, merged into one overview.
// Each cell value is "<Mbar><M>" with statuses p (polynomial), n (not), u (unknown).
var pointcountPhrase = { p: "polynomial in q", n: "not polynomial in q", u: "not known" };
var pointcountReferences = {
  "2206.07759": { author: "Bergström, Jonas and Faber, Carel and Payne, Sam", title: "Polynomial point counts and odd cohomology vanishing on moduli spaces of stable curves", year: 2022 },
  "2410.19913": { author: "Canning, Samir and Larson, Hannah and Payne, Sam and Willwacher, Thomas", title: "Moduli spaces of curves with polynomial point counts", year: 2024 },
  "2606.29656": larsonSurvey
};
var pointcountProp = {
  label: "Point count",
  blurb: "The point count is the number of points of the moduli space over a finite field with <i>q</i> elements, as a function of <i>q</i>. Whether it is a polynomial in <i>q</i> reflects the arithmetic complexity of the space: when it is not, the count already involves the coefficients of modular forms.",
  references: pointcountReferences,
  legend: [
    { cls: "pc-both",    text: "#" + MBAR + "<sub>g,n</sub> and #M<sub>g,n</sub> polynomial" },
    { cls: "pc-cpt",     text: "only #" + MBAR + "<sub>g,n</sub> polynomial" },
    { cls: "pc-open",    text: "only #M<sub>g,n</sub> polynomial" },
    { cls: "pc-neither", text: "point count not polynomial" },
    { cls: "",           text: "nothing known" }
  ],
  classify: function(g, n) {
    var v = pointcount[g + "," + n];
    if (!v) return { cls: "", info: "", refs: [] };
    var b = v[0], m = v[1], cls;
    if (b === "p" && m === "p") cls = "pc-both";
    else if (b === "p")         cls = "pc-cpt";
    else if (m === "p")         cls = "pc-open";
    else                        cls = "pc-neither";
    var info = "#" + Mbar(g, n) + "(F<sub>q</sub>) is " + pointcountPhrase[b]
             + "; #" + Mopen(g, n) + "(F<sub>q</sub>) is " + pointcountPhrase[m];
    return { cls: cls, info: info, refs: ["2410.19913", "2606.29656"] };
  }
};

// registry of available properties; propertyOrder fixes the button order
var properties = {
  kodaira: kodaira,
  tautological: tautologicalProp,
  pointcount: pointcountProp
};
var propertyOrder = ["kodaira", "tautological", "pointcount"];
var current = null;

// (re-)typeset any math in the reference titles after they are rebuilt
function typesetMath() {
  if (window.MathJax && MathJax.typesetPromise)
    MathJax.typesetPromise([document.getElementById("references")]);
}

function renderReferences(prop) {
  var list = $("ul#references").empty();
  $("span#specifier").html("");
  for (var key in prop.references) {
    var reference = prop.references[key];
    var entry = reference.author + ", <em>" + reference.title + "</em>"
              + " (<strong>" + reference.year + "</strong>)";
    if ("journal" in reference) entry += ", " + reference.journal;
    if ("pages" in reference)   entry += ", " + reference.pages[0] + "–" + reference.pages[1];
    if (key.startsWith("MR"))
      entry += " [<a href='https://mathscinet.ams.org/mathscinet-getitem?mr=" + key + "'>" + key + "</a>]";
    if (/^\d{4}/.test(key))
      entry += " [<a href='https://arxiv.org/abs/" + key + "'>" + key + "</a>]";
    list.append($("<li data-key='" + key + "'>" + entry + "</li>"));
  }
  typesetMath();
}

function renderLegend(prop) {
  var legend = $("div#legend").empty();
  prop.legend.forEach(function(r) {
    legend.append($("<p class='m-0'><span class='swatch " + r.cls + "'></span> " + r.text + "</p>"));
  });
}

function cellClick(prop) {
  return function() {
    var g = $(this).data("g"), n = $(this).data("n");
    if ($(this).hasClass("active")) {
      $("ul#references li").show();
      $("span#specifier").html("");
      $("p#information").css("visibility", "hidden");
      $(this).removeClass("active");
      return;
    }
    $("td.cell").removeClass("active");
    $(this).addClass("active");
    $("p#none").remove();

    var c = prop.classify(g, n);
    $("p#information").css("visibility", "visible").html(c.info);

    $("ul#references li").hide();
    if (c.refs && c.refs.length > 0)
      for (const key of c.refs) $("li[data-key~='" + key + "']").show();
    else
      $("ul#references").append($("<p id='none'>no references available</p>"));
    $("span#specifier").html(" for " + Mopen(g, n));
  };
}

function renderTable(prop) {
  var table = $("table#mgnbar").empty();

  var row = $("<tr><td style='font-size: 125%'>ₙ\\ᵍ</td></tr>");
  for (var g = G_MIN; g <= G_MAX; g++) row.append($("<th>" + g + "</th>"));
  table.append(row);

  for (var n = N_MIN; n <= N_MAX; n++) {
    row = $("<tr></tr>");
    row.append($("<th>" + n + "</th>"));
    for (var g = G_MIN; g <= G_MAX; g++) {
      var cell = $("<td>●</td>").addClass("cell").data("g", g).data("n", n);
      var cls = prop.classify(g, n).cls;
      if (cls) cell.addClass(cls);
      cell.on("click", cellClick(prop));
      row.append(cell);
    }
    table.append(row);
  }
}

function selectProperty(id) {
  current = properties[id];
  $("#selector [data-prop]").removeClass("active");
  $("#selector [data-prop='" + id + "']").addClass("active");
  $("p#blurb").html(current.blurb || "");
  $("p#information").css("visibility", "hidden");
  renderTable(current);
  renderLegend(current);
  renderReferences(current);
}

// each layer has its own real URL, so selecting one updates the address bar
// (via the History API) and the browser back/forward buttons work
var layerPath = { kodaira: "/", tautological: "/tautological/", pointcount: "/point-count/" };
function layerFromPath(p) {
  for (var id in layerPath)
    if (layerPath[id] === p || layerPath[id] === p + "/") return id;
  return propertyOrder[0];
}

$(function() {
  if (!document.getElementById("selector")) return;   // not an overview page
  var group = $("#selector");
  propertyOrder.forEach(function(id) {
    $("<a class='btn btn-sm btn-outline-dark' data-prop='" + id + "' href='" + layerPath[id] + "'>"
      + properties[id].label + "</a>")
      .on("click", function(e) {
        e.preventDefault();
        history.pushState(null, "", layerPath[id]);
        selectProperty(id);
      })
      .appendTo(group);
  });
  window.addEventListener("popstate", function() {
    selectProperty(layerFromPath(location.pathname));
  });
  var initial = (typeof INITIAL_LAYER !== "undefined" && properties[INITIAL_LAYER])
    ? INITIAL_LAYER : layerFromPath(location.pathname);
  selectProperty(initial);
});
</script>
